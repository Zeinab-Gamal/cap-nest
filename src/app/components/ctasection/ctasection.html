 <section id="joinus"
   class="section-padding scroll-mt-24 bg-linear-to-b from-green-dark to-green relative overflow-hidden">
   <div class="absolute inset-0">
     <div
       class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-150 h-150 bg-green/10 rounded-full blur-3xl">
     </div>
   </div>

   <div class="container relative z-10 mx-auto ">
     <div class="max-w-3xl mx-auto text-center">
       <h2 class="font-heading text-4xl md:text-5xl lg:text-6xl font-semibold text-cream mb-6">
         {{'ctaSection.title' | translate }}
         <span class="text-green-light block">{{'ctaSection.subtitle' | translate }}</span>
       </h2>
       <p class="text-cream/70 font-body text-lg md:text-xl mb-10 max-w-xl mx-auto">
         {{'ctaSection.description' | translate }}
       </p>

       <div class="flex flex-col sm:flex-row gap-4 justify-center">
         <Button class="btn btn-hero btn-xl" (click)="toggleFormModal()">
           {{'ctaSection.joinWaitingList' | translate }}
           <fa-icon [icon]="arrowRightIcon" class="ml-2 rtl:rotate-180" />
         </Button>
         <Button class="btn btn-heroOutline btn-xl">
           {{'ctaSection.scheduleCall' | translate }}
         </Button>
       </div>

       <p class="text-cream/50 font-body text-sm mt-8">
         {{'ctaSection.noCreditCard' | translate }}
       </p>
     </div>
   </div>
 </section>
 @if(showFormModal()) {
 <app-form-modal (onClose)="toggleFormModal()" />
 }
