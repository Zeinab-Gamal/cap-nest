 <section id="joinus"
   class="section-padding scroll-mt-24 bg-linear-to-b from-gold-dark to-gold relative overflow-hidden">
   <div class="absolute inset-0">
     <div
       class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-150 h-150 bg-gold/10 rounded-full blur-3xl">
     </div>
   </div>

   <div class="container-main relative z-10">
     <div class="max-w-3xl mx-auto text-center">
       <h2 class="font-heading text-4xl md:text-5xl lg:text-6xl font-semibold text-cream mb-6">
         Ready to Build Your
         <span class="text-gold-light block">Real Estate Portfolio?</span>
       </h2>
       <p class="text-cream/70 font-body text-lg md:text-xl mb-10 max-w-xl mx-auto">
         Join thousands of investors earning passive income through fractional property ownership. Start your journey
         today.
       </p>

       <div class="flex flex-col sm:flex-row gap-4 justify-center">
         <Button class="btn btn-hero btn-xl">
           Join The Waiting List
           <fa-icon [icon]="arrowRightIcon" class="ml-2" />
         </Button>
         <Button class="btn btn-heroOutline btn-xl">
           Schedule a Call
         </Button>
       </div>

       <p class="text-cream/50 font-body text-sm mt-8">
         No credit card required • Start investing in minutes
       </p>
     </div>
   </div>
 </section>
